      - scenario: "Student views booking status and history"
        preconditions: "Student is logged in"
        input_action: "GET /hostel/guest-room/my-bookings"
        expected_result: "All bookings displayed with status (Pending/Approved/Rejected/Completed)"

    exception_paths:
      - scenario: "Check-out date is before or same as check-in date"
        preconditions: "Student is logged in"
        input_action: "POST /hostel/guest-room/book with check_out <= check_in"
        expected_result: "System displays error, prevents proceeding"

      - scenario: "No guest rooms available for selected dates"
        preconditions: "Student is logged in"
        input_action: "GET /hostel/guest-room/availability — no rooms available"
        expected_result: "System displays 'No rooms available', suggests alternative dates"

      - scenario: "Validation fails — missing guest name, invalid dates, or empty reason"
        preconditions: "Student is logged in"
        input_action: "POST /hostel/guest-room/book with missing required fields"
        expected_result: "System displays specific error messages for each field"


  - id: "HM-UC-037"
    title: "Approve and Manage Booking"
    description: "Caretaker reviews guest room requests, approves/rejects, manages check-in/check-out, handles damages and fines, configures policies"
    actors: "Caretaker, Student, System"
    preconditions: "Caretaker is logged in, assigned to relevant hostel, booking requests or approved bookings exist"

    happy_paths:
      - scenario: "Caretaker approves guest room booking request"
        preconditions: "Caretaker is logged in, pending booking exists"
        input_action: "PUT /hostel/guest-room/booking/{id}/approve"
        expected_result: "Booking status updated to 'Approved', room reserved, Student notified with confirmation"

      - scenario: "Caretaker completes guest check-in process"
        preconditions: "Caretaker is logged in, approved booking exists, check-in date arrived"
        input_action: "PUT /hostel/guest-room/booking/{id}/check-in with guest_id_verified=true, id_doc='Aadhaar', key_issued=true"
        expected_result: "Booking status updated to 'Checked-In', check-in timestamp recorded"

      - scenario: "Caretaker completes guest check-out with no damages"
        preconditions: "Caretaker is logged in, guest checked in"
        input_action: "PUT /hostel/guest-room/booking/{id}/check-out with room_condition='good', key_collected=true"
        expected_result: "Booking status updated to 'Completed', room status set to 'Available'"

    alternate_paths:
      - scenario: "Caretaker rejects booking request with reason"
        preconditions: "Caretaker is logged in, pending booking exists"
        input_action: "PUT /hostel/guest-room/booking/{id}/reject with reason='room_unavailable', comments='All rooms under maintenance'"
        expected_result: "Status updated to 'Rejected', Student notified with rejection reason"

      - scenario: "Room damages found during check-out inspection"
        preconditions: "Caretaker is logged in, guest checked in"
        input_action: "PUT /hostel/guest-room/booking/{id}/check-out with damages=[{description, photos, cost}]"
        expected_result: "Damages documented, fine created and linked to student account, check-out marked as 'Completed with Damages'"

      - scenario: "Caretaker configures guest room booking policies"
        preconditions: "Caretaker is logged in"
        input_action: "PUT /hostel/guest-room/settings with per_day_rate=500, max_duration=7, advance_notice=2"
        expected_result: "Booking policies saved and applied to future requests"

      - scenario: "Caretaker generates guest room booking report"
        preconditions: "Caretaker is logged in, booking data exists"
        input_action: "POST /hostel/reports/guest-rooms with date_range=last_quarter"
        expected_result: "Report generated with total bookings, approval rates, utilization, revenue, and damages summary"

    exception_paths:
      - scenario: "Student has outstanding fines or disciplinary actions — booking may be rejected"
        preconditions: "Caretaker is logged in, student has outstanding issues"
        input_action: "GET /hostel/guest-room/booking/{id} — student eligibility check fails"
        expected_result: "Caretaker may reject booking or request clearance before approval"

      - scenario: "Guest identity verification fails during check-in"
        preconditions: "Caretaker is logged in, approved booking exists"
        input_action: "PUT /hostel/guest-room/booking/{id}/check-in — ID verification fails"
        expected_result: "Check-in denied, Caretaker contacts student for clarification, booking may be cancelled"


  # ===========================================================================
  # EXTENDED STAY MANAGEMENT (UC-038 to UC-040)
  # ===========================================================================

  - id: "HM-UC-038"
    title: "Apply for Extended Stay"
    description: "Student submits request for staying in hostel during vacation periods with faculty authorization, charge acknowledgment"
    actors: "Student, Caretaker, Warden, System"
    preconditions: "Student is logged in, has active hostel accommodation, vacation period declared, no pending request for same period"

    happy_paths:
      - scenario: "Student submits extended stay application with all required details"
        preconditions: "Student is logged in, vacation period exists"
        input_action: "POST /hostel/extended-stay with vacation_period_id={id}, start_date=2026-05-15, end_date=2026-06-15, reason='Research project deadline', authorization=faculty_letter.pdf, acknowledge_charges=true"
        expected_result: "Application created with status='Pending', estimated charges calculated and displayed, faculty letter uploaded, Caretaker/Warden notified, confirmation with application ID"

    alternate_paths:
      - scenario: "Student views their extended stay application status"
        preconditions: "Student is logged in, application submitted"
        input_action: "GET /hostel/extended-stay/my-applications"
        expected_result: "All applications displayed with status, approval/rejection comments, and charge details"

      - scenario: "Student modifies a pending application"
        preconditions: "Student is logged in, pending application exists"
        input_action: "PUT /hostel/extended-stay/{id} with updated dates and new authorization document"
        expected_result: "Application reset to 'Pending', Caretaker/Warden notified of modification"

      - scenario: "Student cancels application before stay start date"
        preconditions: "Student is logged in, pending or approved application exists"
        input_action: "DELETE /hostel/extended-stay/{id} with reason='Travel plans changed'"
        expected_result: "Status updated to 'Cancelled', room reservation released (if approved), Caretaker/Warden notified"

      - scenario: "Student views application history with past stays"
        preconditions: "Student is logged in"
        input_action: "GET /hostel/extended-stay/history"
        expected_result: "All past applications displayed with dates, status, charges paid, vacation periods"

    exception_paths:
      - scenario: "Selected dates outside vacation period or end before start"
        preconditions: "Student is logged in"
        input_action: "POST /hostel/extended-stay with dates outside vacation period"
        expected_result: "System displays error, prevents proceeding"

      - scenario: "Uploaded file exceeds size limit or unsupported format"
        preconditions: "Student is logged in"
        input_action: "POST /hostel/extended-stay with authorization file > 5MB or non-PDF/JPG/PNG"
        expected_result: "System displays error, prompts valid file upload"

      - scenario: "Validation fails — missing reason, no authorization, terms not acknowledged"
        preconditions: "Student is logged in"
        input_action: "POST /hostel/extended-stay with missing required fields"
        expected_result: "Specific error displayed for each field, problematic fields highlighted in red"


  - id: "HM-UC-039"
    title: "Review and Approve Extended Stay Application"
    description: "Caretaker or Warden reviews applications, verifies faculty authorization, checks availability and conduct, approves or rejects"
    actors: "Caretaker, Warden, Student, System"
    preconditions: "Staff is logged in, assigned to relevant hostel, pending application exists, vacation period configured"

    happy_paths:
      - scenario: "Caretaker/Warden approves extended stay application after full review"
        preconditions: "Staff is logged in, pending application exists, all checks pass"
        input_action: "PUT /hostel/extended-stay/{id}/approve with comments='Authorization verified, room available, good conduct record'"
        expected_result: "Application status updated to 'Approved', Student notified with stay details and charges, room reserved"

    alternate_paths:
      - scenario: "Caretaker/Warden rejects application with specific reason"
        preconditions: "Staff is logged in, pending application exists"
        input_action: "PUT /hostel/extended-stay/{id}/reject with reason='invalid_authorization', comments='Authorization letter not signed by faculty advisor'"
        expected_result: "Status updated to 'Rejected', Student notified with reason and appeal option"

      - scenario: "Emergency/urgent request — expedited processing"
        preconditions: "Staff is logged in, urgent application flagged"
        input_action: "PUT /hostel/extended-stay/{id}/approve with type='emergency', temporary=true, authorization_deadline=48_hours"
        expected_result: "Temporary approval granted, student must submit full authorization within 48 hours or approval auto-revoked"

      - scenario: "Student appeals rejection — Warden reviews appeal"
        preconditions: "Warden is logged in, rejected application with appeal submitted"
        input_action: "PUT /hostel/extended-stay/{id}/appeal-decision with decision='overturn', comments='New evidence reviewed, approved'"
        expected_result: "Appeal decision sent to Student, Warden's decision is final"

    exception_paths:
      - scenario: "Faculty authorization appears invalid or forged"
        preconditions: "Staff is logged in"
        input_action: "PUT /hostel/extended-stay/{id}/mark-invalid-auth"
        expected_result: "Authorization marked as 'Invalid', student contacted for clarification, may be rejected immediately"

      - scenario: "Rooms not available during vacation period"
        preconditions: "Staff is logged in, capacity reached"
        input_action: "GET /hostel/extended-stay/{id}/availability — no availability"
        expected_result: "System displays 'No Availability' warning, staff suggests alternatives or rejects"

      - scenario: "Student has poor conduct record — escalation or rejection"
        preconditions: "Staff is logged in, student has multiple fines/disciplinary actions"
        input_action: "GET /hostel/extended-stay/{id}/student-conduct — poor record"
        expected_result: "Caretaker may escalate to Warden or reject citing conduct concerns"


  - id: "HM-UC-040"
    title: "Manage Extended Stay Operations"
    description: "System manages room reservation, charge calculation, payment tracking, service coordination, presence monitoring, violation handling, and reporting for extended stays"
    actors: "System, Caretaker, Warden, Student"
    preconditions: "Extended stay application approved, vacation period configured, charges and policies configured"

    happy_paths:
      - scenario: "System automatically reserves room and calculates charges after approval"
        preconditions: "Extended stay application approved"
        input_action: "System event: extended stay application approved"
        expected_result: "Room reserved and marked as 'Reserved - Extended Stay', charges calculated (days × rate + facilities + taxes), charge record created, Student notified with payment details"

      - scenario: "Student pays and Caretaker verifies payment"
        preconditions: "Charges calculated, student submits payment"
        input_action: "PUT /hostel/extended-stay/{id}/verify-payment with payment_ref='TXN123', amount_verified=true"
        expected_result: "Payment status updated to 'Paid', receipt issued to Student"

      - scenario: "Caretaker coordinates vacation services for extended stay students"
        preconditions: "Caretaker is logged in, approved extended stays exist"
        input_action: "GET /hostel/extended-stay/vacation-services"
        expected_result: "Expected occupancy count displayed, Caretaker can plan mess, cleaning, and security"

    alternate_paths:
      - scenario: "Caretaker monitors student presence during vacation"
        preconditions: "Vacation period active, students staying"
        input_action: "POST /hostel/extended-stay/attendance with student_id={id}, status='present'"
        expected_result: "Presence recorded, attendance log maintained"

      - scenario: "Rule violation reported during vacation period"
        preconditions: "Caretaker is logged in, violation occurs"
        input_action: "POST /hostel/extended-stay/{id}/violation with type='unauthorized_guest', description='Guest found after hours', severity='major'"
        expected_result: "Violation documented, linked to extended stay record, fine imposed, affects future eligibility"

      - scenario: "Warden generates extended stay reports"
        preconditions: "Warden is logged in, extended stay data exists"
        input_action: "POST /hostel/reports/extended-stay with type='revenue', vacation_period={id}"
        expected_result: "Report generated with occupancy summary, revenue, payment rates, violation statistics, service costs"

    exception_paths:
      - scenario: "Payment not received by deadline — escalation and potential revocation"
        preconditions: "Payment deadline approaching or passed"
        input_action: "System event: payment deadline exceeded"
        expected_result: "Reminder sent to Student, if unpaid by vacation start escalated to Caretaker, approval may be revoked, room reservation cancelled"

      - scenario: "Payment verification fails — amount mismatch or invalid reference"
        preconditions: "Caretaker verifying payment"
        input_action: "PUT /hostel/extended-stay/{id}/verify-payment with amount_mismatch=true"
        expected_result: "Caretaker contacts Student for clarification, student provides correct details, re-verification performed"

      - scenario: "Prolonged unauthorized absence during vacation stay"
        preconditions: "Student approved for extended stay, absent 2+ consecutive days"
        input_action: "System event: prolonged absence detected"
        expected_result: "System flags absence, alert sent to Caretaker, investigation initiated, may result in fine or affect future eligibility"
