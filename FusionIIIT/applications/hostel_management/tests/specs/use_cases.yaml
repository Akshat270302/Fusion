use_cases:

  # ===========================================================================
  # LEAVE MANAGEMENT (UC-001 to UC-005)
  # ===========================================================================

  - id: "HM-UC-001"
    title: "Submit Leave Request"
    description: "Student submits leave application with mandatory supporting documents for Caretaker approval"
    actors: "Student, Caretaker"
    preconditions: "Student is logged in and has active hostel allocation"

    happy_paths:
      - scenario: "Student submits a leave request with all valid details and documents"
        preconditions: "Student is logged in and has active hostel allocation"
        input_action: "POST /hostel/leave with start_date=future, end_date=future+3, reason='Family event', supporting_documents=medical_cert.pdf"
        expected_result: "Leave request created with status='Pending', Caretaker notified, success message displayed"

      - scenario: "Student submits leave request with multiple supporting documents"
        preconditions: "Student is logged in and has active hostel allocation"
        input_action: "POST /hostel/leave with valid dates, reason, and multiple document uploads (medical_cert.pdf, parental_consent.pdf)"
        expected_result: "Leave request created with status='Pending', all documents attached, Caretaker notified"

    alternate_paths:
      - scenario: "Student does not upload supporting documents"
        preconditions: "Student is logged in"
        input_action: "POST /hostel/leave with valid dates and reason but no supporting documents"
        expected_result: "System prompts upload before submission, form data retained"

    exception_paths:
      - scenario: "Student enters invalid dates (past start date or end before start)"
        preconditions: "Student is logged in"
        input_action: "POST /hostel/leave with start_date=yesterday or end_date < start_date"
        expected_result: "System displays error message, prompts date correction, no leave request created"

      - scenario: "Student submits with missing required fields"
        preconditions: "Student is logged in"
        input_action: "POST /hostel/leave with missing reason or dates"
        expected_result: "Validation fails, system shows error for missing fields, request not submitted"


  - id: "HM-UC-002"
    title: "Process Leave Request"
    description: "Caretaker reviews pending leave requests with supporting documents and approves or rejects them"
    actors: "Caretaker, Student"
    preconditions: "Caretaker is logged in, at least one leave request exists with 'Pending' status"

    happy_paths:
      - scenario: "Caretaker approves a leave request with valid documents"
        preconditions: "Caretaker is logged in, pending leave request exists"
        input_action: "PUT /hostel/leave/{id}/approve with remarks='Approved, documents verified'"
        expected_result: "Leave status updated to 'Approved', student attendance record updated, Student notified"

      - scenario: "Caretaker rejects a leave request with rejection reason"
        preconditions: "Caretaker is logged in, pending leave request exists"
        input_action: "PUT /hostel/leave/{id}/reject with reason='Insufficient documentation'"
        expected_result: "Leave status updated to 'Rejected', Student notified with rejection reason"

    alternate_paths:
      - scenario: "Caretaker rejects request and must provide mandatory reason"
        preconditions: "Caretaker is logged in, pending leave request exists"
        input_action: "PUT /hostel/leave/{id}/reject with reason='Documents not matching'"
        expected_result: "Leave rejected with reason recorded, Student notified"

    exception_paths:
      - scenario: "Supporting documents are unavailable or corrupted"
        preconditions: "Caretaker is logged in, pending leave request exists"
        input_action: "GET /hostel/leave/{id}/documents — documents fail to load"
        expected_result: "System displays error, Caretaker contacts Student for re-upload"

      - scenario: "Caretaker tries to reject without providing a reason"
        preconditions: "Caretaker is logged in, pending leave request exists"
        input_action: "PUT /hostel/leave/{id}/reject with empty reason"
        expected_result: "System enforces mandatory rejection reason, submission blocked"


  - id: "HM-UC-003"
    title: "View Leave Status and History"
    description: "Student or Caretaker views current status and past history of leave requests"
    actors: "Student, Caretaker"
    preconditions: "Actor is logged in, at least one leave request exists"

    happy_paths:
      - scenario: "Student views their leave history with all statuses"
        preconditions: "Student is logged in, leave requests exist"
        input_action: "GET /hostel/leave/history"
        expected_result: "System displays list of leave requests with status, dates, reason, documents, and decision remarks"

      - scenario: "Caretaker views all leave requests for assigned hostel"
        preconditions: "Caretaker is logged in, leave requests exist for assigned hostel"
        input_action: "GET /hostel/leave/all?hostel={hostel_id}"
        expected_result: "System displays all leave requests for the hostel with statuses (Pending, Approved, Rejected)"

    alternate_paths:
      - scenario: "Actor returns to list without viewing individual leave details"
        preconditions: "Actor is logged in"
        input_action: "GET /hostel/leave/history — actor does not select any specific request"
        expected_result: "Flow ends at list view, no detail displayed"

    exception_paths:
      - scenario: "No leave requests found for the actor"
        preconditions: "Actor is logged in, no leave requests exist"
        input_action: "GET /hostel/leave/history"
        expected_result: "System displays 'No leave requests available' message"


  - id: "HM-UC-004"
    title: "Update Attendance and Send Notification"
    description: "System automatically updates student attendance based on leave approval and sends notifications"
    actors: "System, Student, Caretaker"
    preconditions: "Leave request exists and a status change has occurred"

    happy_paths:
      - scenario: "Leave approved — system updates attendance and notifies student"
        preconditions: "Leave request approved by Caretaker"
        input_action: "System event: leave status changed to 'Approved'"
        expected_result: "Attendance marked as 'On Leave' for leave duration, Student notified, event logged"

      - scenario: "Leave submitted — system notifies Caretaker"
        preconditions: "Student submits new leave request"
        input_action: "System event: new leave request submitted"
        expected_result: "Caretaker notified of new leave request via Fusion notification system"

    alternate_paths:
      - scenario: "Leave rejected — system notifies student without updating attendance"
        preconditions: "Leave request rejected by Caretaker"
        input_action: "System event: leave status changed to 'Rejected'"
        expected_result: "Student notified of rejection, attendance not updated, event logged"

    exception_paths:
      - scenario: "Notification delivery fails"
        preconditions: "Leave status change occurred"
        input_action: "System event: notification send fails"
        expected_result: "Retry scheduled, error logged for admin review"

      - scenario: "Attendance update fails causing inconsistency"
        preconditions: "Leave approved but attendance system unreachable"
        input_action: "System event: attendance update fails"
        expected_result: "Inconsistency flagged, error logged for admin review"


  - id: "HM-UC-005"
    title: "Generate Leave Report"
    description: "Caretaker or Warden generates reports on leave requests and approval patterns"
    actors: "Caretaker, Warden"
    preconditions: "Actor is logged in with appropriate role permissions, leave data exists"

    happy_paths:
      - scenario: "Caretaker generates leave report for current month with all statuses"
        preconditions: "Caretaker is logged in, leave data exists"
        input_action: "POST /hostel/reports/leave with date_range=current_month, status=all, hostel={hostel_id}"
        expected_result: "Report generated with total requests, approved, rejected, pending counts and approval patterns"

      - scenario: "Warden generates leave report across all hostels"
        preconditions: "Warden is logged in, leave data exists"
        input_action: "POST /hostel/reports/leave with date_range=last_semester, status=all, hostel=all"
        expected_result: "Report generated with leave statistics and trends across all hostels"

    alternate_paths:
      - scenario: "Actor does not specify parameters — system uses defaults"
        preconditions: "Actor is logged in"
        input_action: "POST /hostel/reports/leave with no parameters"
        expected_result: "System uses default values (current month, all statuses) and generates report"

      - scenario: "Actor downloads report as PDF or Excel"
        preconditions: "Report is generated and displayed"
        input_action: "GET /hostel/reports/leave/{id}/download?format=pdf"
        expected_result: "System generates PDF/Excel file for download"

    exception_paths:
      - scenario: "Actor specifies invalid report parameters"
        preconditions: "Actor is logged in"
        input_action: "POST /hostel/reports/leave with end_date < start_date or future-only dates"
        expected_result: "System displays error, prompts correction"


  # ===========================================================================
  # COMPLAINT MANAGEMENT (UC-006 to UC-009)
  # ===========================================================================

  - id: "HM-UC-006"
    title: "Submit Complaint"
    description: "Student submits complaint with category, description, and optional attachments for Caretaker resolution"
    actors: "Student, Caretaker"
    preconditions: "Student is logged in and has active hostel allocation"

    happy_paths:
      - scenario: "Student submits a complaint with category, description, and attachments"
        preconditions: "Student is logged in, has active hostel allocation"
        input_action: "POST /hostel/complaint with category='facility', description='Broken window in room 201', attachments=[photo.jpg]"
        expected_result: "Complaint recorded with 'Submitted' status, unique complaint ID assigned, Caretaker notified"

      - scenario: "Student submits complaint without optional attachments"
        preconditions: "Student is logged in"
        input_action: "POST /hostel/complaint with category='service', description='No hot water supply' and no attachments"
        expected_result: "Complaint recorded successfully without attachments, Caretaker notified"

    alternate_paths:
      - scenario: "Student submits complaint with no attachments (optional field)"
        preconditions: "Student is logged in"
        input_action: "POST /hostel/complaint with category and description only"
        expected_result: "System proceeds without attachments, complaint created successfully"

    exception_paths:
      - scenario: "Validation fails due to missing category or description"
        preconditions: "Student is logged in"
        input_action: "POST /hostel/complaint with missing category or empty description"
        expected_result: "System displays error, prompts correction, complaint not submitted"


  - id: "HM-UC-007"
    title: "Review and Address Complaint"
    description: "Caretaker reviews, investigates, and resolves student complaints by coordinating with staff and inventory"
    actors: "Caretaker, Student, Hostel Staff"
    preconditions: "Caretaker is logged in, at least one complaint exists with 'Submitted' or 'In Progress' status"

    happy_paths:
      - scenario: "Caretaker reviews, investigates, and resolves a complaint"
        preconditions: "Caretaker is logged in, complaint exists with 'Submitted' status"
        input_action: "PUT /hostel/complaint/{id}/resolve with status='Resolved', resolution_details='Window replaced', remarks='Fixed on 2026-04-14'"
        expected_result: "Complaint status updated to 'Resolved', resolution timestamp recorded, Student notified"

    alternate_paths:
      - scenario: "Issue requires staff coordination — Caretaker assigns task to staff"
        preconditions: "Caretaker is logged in, complaint is 'In Progress'"
        input_action: "PUT /hostel/complaint/{id}/assign with staff_id={staff_id}, task='Replace window glass'"
        expected_result: "Task assigned to relevant staff, Caretaker monitors progress"

      - scenario: "Complaint cannot be resolved at Caretaker level — escalation to Warden"
        preconditions: "Caretaker is logged in, complaint is 'In Progress'"
        input_action: "PUT /hostel/complaint/{id}/escalate — triggers UC-008"
        expected_result: "Complaint escalated to Warden (see HM-UC-008)"

    exception_paths:
      - scenario: "Complaint status update fails"
        preconditions: "Caretaker is logged in"
        input_action: "PUT /hostel/complaint/{id}/resolve — system error occurs"
        expected_result: "Complaint status remains unchanged, error message displayed"


  - id: "HM-UC-008"
    title: "Escalate Complaint to Warden"
    description: "Caretaker escalates unresolved or critical complaints to Warden for higher-level intervention"
    actors: "Caretaker, Warden, Student"
    preconditions: "Caretaker is logged in, complaint exists with 'In Progress' status and has been investigated"

    happy_paths:
      - scenario: "Caretaker escalates complaint with valid reason and remarks"
        preconditions: "Caretaker is logged in, complaint is 'In Progress'"
        input_action: "POST /hostel/complaint/{id}/escalate with reason='Budget approval needed for major repair', remarks='Estimated cost ₹50,000'"
        expected_result: "Complaint status updated to 'Escalated', Warden notified, Student informed, escalation details recorded"

    alternate_paths: []

    exception_paths:
      - scenario: "Caretaker tries to escalate without providing reason"
        preconditions: "Caretaker is logged in"
        input_action: "POST /hostel/complaint/{id}/escalate with empty reason"
        expected_result: "System prompts Caretaker to provide reason, escalation blocked"

      - scenario: "Escalation submission fails due to system error"
        preconditions: "Caretaker is logged in"
        input_action: "POST /hostel/complaint/{id}/escalate — system error occurs"
        expected_result: "Complaint status remains 'In Progress', error message displayed"


  - id: "HM-UC-009"
    title: "View and Manage Complaint Reports"
    description: "Warden monitors escalated complaints, views complaint status and history, and generates reports"
    actors: "Warden, Caretaker, Student"
    preconditions: "Warden is logged in, complaint data exists"

    happy_paths:
      - scenario: "Warden monitors and resolves an escalated complaint"
        preconditions: "Warden is logged in, escalated complaint exists"
        input_action: "PUT /hostel/complaint/{id}/resolve with resolution_details='Budget approved, repair scheduled', remarks='Approved ₹50,000'"
        expected_result: "Complaint status updated to 'Resolved', relevant actors notified, action logged"

      - scenario: "Warden generates comprehensive complaint resolution report"
        preconditions: "Warden is logged in, complaint data exists"
        input_action: "POST /hostel/reports/complaints with date_range=last_quarter, hostel=all"
        expected_result: "Report generated with resolution statistics, average resolution time, and escalation patterns"

    alternate_paths:
      - scenario: "Warden views complaint history for all hostels"
        preconditions: "Warden is logged in"
        input_action: "GET /hostel/complaints/history?hostel=all"
        expected_result: "System displays all complaints with status, dates, and complete history"

      - scenario: "Warden reassigns escalated complaint back to Caretaker"
        preconditions: "Warden is logged in, escalated complaint exists"
        input_action: "PUT /hostel/complaint/{id}/reassign with instructions='Get quotes from 3 vendors'"
        expected_result: "Complaint reassigned to Caretaker with instructions, status remains 'Escalated'"

    exception_paths:
      - scenario: "Report parameters are invalid"
        preconditions: "Warden is logged in"
        input_action: "POST /hostel/reports/complaints with invalid date range"
        expected_result: "System displays error, prompts correction"

      - scenario: "Warden downloads complaint report as PDF/Excel"
        preconditions: "Report generated"
        input_action: "GET /hostel/reports/complaints/{id}/download?format=excel"
        expected_result: "System generates Excel file for download"


  # ===========================================================================
  # ACCOMMODATION MANAGEMENT (UC-010 to UC-015)
  # ===========================================================================

  - id: "HM-UC-010"
    title: "Submit Accommodation Request"
    description: "Students submit hostel accommodation requests through the system"
    actors: "Student"
    preconditions: "Student is registered, hostels are created and activated, accommodation application period is open"

    happy_paths:
      - scenario: "Student submits accommodation request with valid preferences"
        preconditions: "Student is registered, application period is open"
        input_action: "POST /hostel/accommodation with hostel_type='boys', room_preference='single'"
        expected_result: "Accommodation request recorded with 'Pending' status, confirmation displayed"

    alternate_paths: []

    exception_paths:
      - scenario: "Validation fails due to missing required fields"
        preconditions: "Student is logged in"
        input_action: "POST /hostel/accommodation with missing hostel_type"
        expected_result: "System displays error, prompts Student to correct information"


  - id: "HM-UC-011"
    title: "Perform Bulk Room Allotment"
    description: "Super Admin reviews accommodation requests and available capacity, performs bulk room allotment; system prevents over-allocation"
    actors: "Super Admin"
    preconditions: "Super Admin is logged in, pending accommodation requests exist, rooms are available"

    happy_paths:
      - scenario: "Super Admin performs successful bulk room allotment"
        preconditions: "Super Admin is logged in, pending requests and rooms exist"
        input_action: "POST /hostel/allotment/bulk with selected_requests=[...], criteria={hostel, room_type, policies}"
        expected_result: "Rooms allotted to students, occupancy updated, request status set to 'Allotted', summary report generated"

    alternate_paths:
      - scenario: "Super Admin selects all pending requests for bulk allotment"
        preconditions: "Super Admin is logged in, multiple pending requests exist"
        input_action: "POST /hostel/allotment/bulk with selected_requests=all"
        expected_result: "System processes all available requests based on capacity"

    exception_paths:
      - scenario: "Insufficient room capacity for selected requests"
        preconditions: "Super Admin is logged in, more requests than available rooms"
        input_action: "POST /hostel/allotment/bulk with requests exceeding capacity"
        expected_result: "System displays warning, suggests reducing selection or allocating to different hostels"

      - scenario: "Over-allocation detected beyond room capacity"
        preconditions: "Super Admin is logged in"
        input_action: "POST /hostel/allotment/bulk — allocation would exceed room capacity"
        expected_result: "System prevents allotment, displays error with capacity details"


  - id: "HM-UC-012"
    title: "Notify and Record Room Assignments"
    description: "System notifies students and caretakers of room allotments and records assignment history"
    actors: "System, Student, Caretaker"
    preconditions: "Bulk room allotment completed successfully, students assigned rooms"

    happy_paths:
      - scenario: "System successfully notifies all students and caretakers after allotment"
        preconditions: "Bulk allotment completed"
        input_action: "System event: bulk allotment completed"
        expected_result: "All students notified with room details, caretakers notified with occupancy info, assignment history recorded, student profiles updated"

    alternate_paths: []

    exception_paths:
      - scenario: "Notification delivery fails for some students"
        preconditions: "Bulk allotment completed"
        input_action: "System event: notification delivery fails for subset of students"
        expected_result: "System retries failed notifications, logs failed attempts for admin review"


  - id: "HM-UC-013"
    title: "Submit Room Change Request"
    description: "Student submits room change request with reason; system records for Caretaker and Warden review"
    actors: "Student, Caretaker, Warden"
    preconditions: "Student is logged in and has an active room allocation"

    happy_paths:
      - scenario: "Student submits room change request with reason and preferred room"
        preconditions: "Student is logged in with active room allocation"
        input_action: "POST /hostel/room-change with reason='Health issues — need ground floor', preferred_room='G-101'"
        expected_result: "Room change request recorded with 'Pending' status, unique request ID assigned, Caretaker and Warden notified"

      - scenario: "Student submits room change request without specifying preference"
        preconditions: "Student is logged in with active room allocation"
        input_action: "POST /hostel/room-change with reason='Personal conflicts with roommate'"
        expected_result: "Request recorded without preference (optional), Caretaker and Warden notified"

    alternate_paths:
      - scenario: "No preference specified — system proceeds without preference"
        preconditions: "Student is logged in"
        input_action: "POST /hostel/room-change with reason only, no preferred_room"
        expected_result: "System proceeds without preference, request submitted successfully"

    exception_paths:
      - scenario: "Validation fails due to missing reason"
        preconditions: "Student is logged in"
        input_action: "POST /hostel/room-change with empty reason"
        expected_result: "System displays error, prompts correction"


  - id: "HM-UC-014"
    title: "Review and Process Room Change Request"
    description: "Caretaker and Warden review room change request, check availability, and approve or reject"
    actors: "Caretaker, Warden, Student"
    preconditions: "Caretaker and Warden are logged in, at least one room change request exists with 'Pending' status"

    happy_paths:
      - scenario: "Caretaker and Warden approve room change request after compliance check"
        preconditions: "Pending room change request exists, rooms available"
        input_action: "PUT /hostel/room-change/{id}/approve with remarks='Room available, request compliant'"
        expected_result: "Request status updated to 'Approved', decision remarks recorded, ready for room re-allotment"

    alternate_paths:
      - scenario: "No rooms available — Caretaker recommends rejection or waiting list"
        preconditions: "Pending room change request exists, no rooms available"
        input_action: "PUT /hostel/room-change/{id}/reject with remarks='No rooms available, added to waiting list'"
        expected_result: "Request rejected or student added to waiting list"

    exception_paths:
      - scenario: "Request violates hostel policies — Warden rejects"
        preconditions: "Pending room change request exists"
        input_action: "PUT /hostel/room-change/{id}/reject with remarks='Policy violation: Room change not allowed within first semester'"
        expected_result: "Request rejected with policy reference in remarks, Student notified"


  - id: "HM-UC-015"
    title: "Update Room Allocation and Notify"
    description: "System updates room allocation and occupancy for approved requests, notifies student, records history"
    actors: "System, Student, Caretaker"
    preconditions: "Room change request approved, new room is available"

    happy_paths:
      - scenario: "System updates room allocation after approved room change"
        preconditions: "Room change request approved, new room available"
        input_action: "System event: Caretaker performs room re-allotment to new room"
        expected_result: "Student's room updated, occupancy decremented for old room and incremented for new room, Student notified with new room details, assignment history recorded"

    alternate_paths:
      - scenario: "Request was rejected — system sends rejection notification"
        preconditions: "Room change request rejected"
        input_action: "System event: request is rejected"
        expected_result: "System sends rejection notification to Student with remarks, flow ends"

    exception_paths:
      - scenario: "New room no longer available at time of re-allotment"
        preconditions: "Room change approved but room occupied in interim"
        input_action: "System event: room availability check fails during re-allotment"
        expected_result: "System alerts Caretaker, request status reverted to 'Pending' for reassignment"


  # ===========================================================================
  # FINE MANAGEMENT (UC-016 to UC-018)
  # ===========================================================================

  - id: "HM-UC-016"
    title: "Impose and Record Fine"
    description: "Caretaker imposes a fine on a student for violations including hostel rule violations, property damage, attendance violations, or room standards violations"
    actors: "Caretaker, Student, System"
    preconditions: "Caretaker is logged in with permissions, student is a current resident of the hostel"

    happy_paths:
      - scenario: "Caretaker imposes fine for hostel rule violation with all details"
        preconditions: "Caretaker is logged in, student is hostel resident"
        input_action: "POST /hostel/fine with student_id={id}, category='Hostel Rule Violation', amount=500, reason='Unauthorized guest in room after hours', evidence=[photo.jpg]"
        expected_result: "Fine record created with status='Unpaid', Student notified with fine details and payment instructions, fine visible in dashboards"

      - scenario: "Caretaker imposes fine for property damage with category-specific fields"
        preconditions: "Caretaker is logged in, student is hostel resident"
        input_action: "POST /hostel/fine with student_id={id}, category='Property Damage/Loss', amount=2000, reason='Broken window glass', item_description='Room window pane', repair_cost=2000"
        expected_result: "Fine record created with status='Unpaid', category-specific fields recorded, Student notified"

    alternate_paths:
      - scenario: "Caretaker imposes fine without optional supporting evidence"
        preconditions: "Caretaker is logged in"
        input_action: "POST /hostel/fine with valid category, amount, reason but no evidence uploads"
        expected_result: "Fine created successfully without evidence attachments"

    exception_paths:
      - scenario: "Uploaded evidence file exceeds size limit or unsupported format"
        preconditions: "Caretaker is logged in"
        input_action: "POST /hostel/fine with evidence file > 5MB or unsupported format"
        expected_result: "System displays error, prevents submission until corrected"

      - scenario: "Validation fails — amount is zero/negative or reason is empty"
        preconditions: "Caretaker is logged in"
        input_action: "POST /hostel/fine with amount=0 or empty reason"
        expected_result: "System displays specific error for each invalid field, prevents submission"


  - id: "HM-UC-017"
    title: "View and Track Fines"
    description: "Student views all fines including reason, amount, date, payment status and complete fine history"
    actors: "Student"
    preconditions: "Student is logged in, student is or has been a hostel resident"

    happy_paths:
      - scenario: "Student views comprehensive list of all fines"
        preconditions: "Student is logged in, fines exist"
        input_action: "GET /hostel/fines/my"
        expected_result: "System displays all fines with reference ID, category, date, reason, amount, and payment status"

      - scenario: "Student filters fines by status — unpaid only"
        preconditions: "Student is logged in, fines exist"
        input_action: "GET /hostel/fines/my?status=unpaid"
        expected_result: "System displays only unpaid/pending fines"

      - scenario: "Student views detailed fine entry with evidence"
        preconditions: "Student is logged in, fines exist with evidence"
        input_action: "GET /hostel/fines/my/{fine_id}"
        expected_result: "System displays complete details including violation description, Caretaker name, evidence, payment history"

    alternate_paths:
      - scenario: "Student filters fines by date range or category"
        preconditions: "Student is logged in"
        input_action: "GET /hostel/fines/my?category=Property Damage&date_from=2026-01-01&date_to=2026-03-31"
        expected_result: "Filtered list displayed with matching fines"

      - scenario: "Student downloads fine history as PDF report"
        preconditions: "Student is logged in, fines exist"
        input_action: "GET /hostel/fines/my/download?format=pdf"
        expected_result: "PDF generated with student details, fine history table, downloaded to device"

    exception_paths:
      - scenario: "No fines exist for the student"
        preconditions: "Student is logged in, no fines imposed"
        input_action: "GET /hostel/fines/my"
        expected_result: "System displays 'No fines have been imposed on your account'"

      - scenario: "System error — fine data fails to load"
        preconditions: "Student is logged in"
        input_action: "GET /hostel/fines/my — system error"
        expected_result: "Error message displayed, data fails to load"


  - id: "HM-UC-018"
    title: "Monitor and Analyze Fines"
    description: "Warden reviews fine summaries, monitors individual records, identifies repeat offenders, tracks violation patterns, and generates fine reports"
    actors: "Warden"
    preconditions: "Warden is logged in with permissions, assigned to one or more hostels"

    happy_paths:
      - scenario: "Warden views fine management dashboard with summary"
        preconditions: "Warden is logged in, fine data exists"
        input_action: "GET /hostel/fines/dashboard"
        expected_result: "Dashboard displayed with hostel summary, recent fines, quick filters and search"

      - scenario: "Warden generates fine report by violation type and date range"
        preconditions: "Warden is logged in, fine data exists"
        input_action: "POST /hostel/reports/fines with report_type='by_violation', date_range=last_semester, group_by='category'"
        expected_result: "Report generated with data visualizations, detailed tables, and highlighted insights"

    alternate_paths:
      - scenario: "Warden identifies repeat offenders"
        preconditions: "Warden is logged in, fine data exists"
        input_action: "GET /hostel/fines/repeat-offenders?threshold=3"
        expected_result: "List of students with 3+ fines displayed with total fines, frequency, most common violation types"

      - scenario: "Warden exports fine report in multiple formats"
        preconditions: "Report generated"
        input_action: "GET /hostel/reports/fines/{id}/download?format=excel"
        expected_result: "Report exported as Excel/CSV/PDF for analysis"

    exception_paths:
      - scenario: "No fine data exists for selected parameters"
        preconditions: "Warden is logged in"
