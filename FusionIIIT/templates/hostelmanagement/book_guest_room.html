{% block book_guest_room %}
<div class="ui segment">
  <h3 class="ui header">Request Guest Room</h3>
  <p>Fill guest details, check room availability, review summary, and submit your request.</p>

  <form id="guest-room-request-form" class="ui form">
    {% csrf_token %}
    <div class="two fields">
      <div class="field">
        <label>Check-in Date</label>
        <input type="date" name="arrival_date" id="arrival_date" required>
      </div>
      <div class="field">
        <label>Check-out Date</label>
        <input type="date" name="departure_date" id="departure_date" required>
      </div>
    </div>

    <div class="two fields">
      <div class="field">
        <label>Check-in Time</label>
        <input type="time" name="arrival_time" id="arrival_time" required>
      </div>
      <div class="field">
        <label>Check-out Time</label>
        <input type="time" name="departure_time" id="departure_time" required>
      </div>
    </div>

    <div class="three fields">
      <div class="field">
        <label>Room Type</label>
        <select name="room_type" id="room_type" class="ui dropdown" required>
          <option value="">Select room type</option>
          <option value="single">Single</option>
          <option value="double">Double</option>
          <option value="triple">Triple</option>
        </select>
      </div>
      <div class="field">
        <label>Rooms Required</label>
        <input type="number" name="rooms_required" id="rooms_required" min="1" value="1" required>
      </div>
      <div class="field">
        <label>Total Guests</label>
        <input type="number" name="total_guest" id="total_guest" min="1" value="1" required>
      </div>
    </div>

    <button type="button" class="ui teal button" id="check-availability-btn">Check Availability</button>

    <div id="availability-section" class="ui hidden message" style="margin-top: 1rem;"></div>

    <h4 class="ui dividing header">Guest Details</h4>
    <div class="two fields">
      <div class="field">
        <label>Guest Name</label>
        <input type="text" name="guest_name" id="guest_name" required>
      </div>
      <div class="field">
        <label>Guest Phone</label>
        <input type="text" name="guest_phone" id="guest_phone" maxlength="10" required>
      </div>
    </div>

    <div class="two fields">
      <div class="field">
        <label>Guest Email</label>
        <input type="email" name="guest_email" id="guest_email">
      </div>
      <div class="field">
        <label>Nationality</label>
        <input type="text" name="nationality" id="nationality">
      </div>
    </div>

    <div class="field">
      <label>Guest Address</label>
      <input type="text" name="guest_address" id="guest_address">
    </div>

    <div class="field">
      <label>Purpose/Reason</label>
      <textarea name="purpose" id="purpose" rows="3" required></textarea>
    </div>

    <div id="booking-summary" class="ui info message hidden"></div>

    <button type="submit" class="ui primary button" id="submit-booking-btn" disabled>Submit Booking Request</button>
    <div id="guest-room-request-feedback" class="ui hidden message" style="margin-top: 1rem;"></div>
  </form>
</div>

<script>
(function() {
  const form = document.getElementById('guest-room-request-form');
  const availabilitySection = document.getElementById('availability-section');
  const summarySection = document.getElementById('booking-summary');
  const feedback = document.getElementById('guest-room-request-feedback');
  const submitBtn = document.getElementById('submit-booking-btn');
  const checkBtn = document.getElementById('check-availability-btn');

  let lastAvailability = null;

  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return '';
  }

  function showMessage(el, type, text) {
    el.className = `ui ${type} message`;
    el.textContent = text;
  }

  function hideMessage(el) {
    el.className = 'ui hidden message';
    el.textContent = '';
  }

  function readForm() {
    return {
      arrival_date: document.getElementById('arrival_date').value,
      departure_date: document.getElementById('departure_date').value,
      arrival_time: document.getElementById('arrival_time').value,
      departure_time: document.getElementById('departure_time').value,
      room_type: document.getElementById('room_type').value,
      rooms_required: Number(document.getElementById('rooms_required').value || 0),
      total_guest: Number(document.getElementById('total_guest').value || 0),
      guest_name: document.getElementById('guest_name').value.trim(),
      guest_phone: document.getElementById('guest_phone').value.trim(),
      guest_email: document.getElementById('guest_email').value.trim(),
      guest_address: document.getElementById('guest_address').value.trim(),
      purpose: document.getElementById('purpose').value.trim(),
      nationality: document.getElementById('nationality').value.trim(),
    };
  }

  function validateBeforeAvailability(data) {
    if (!data.arrival_date || !data.departure_date || !data.room_type || data.rooms_required < 1) {
      return 'Please provide dates, room type and rooms required.';
    }
    if (data.departure_date <= data.arrival_date) {
      return 'Check-out date must be after check-in date.';
    }
    return '';
  }

  function validateBeforeSubmit(data) {
    if (!lastAvailability || !lastAvailability.is_available) {
      return 'Please run availability check and ensure rooms are available before submitting.';
    }
    if (!data.guest_name || !data.guest_phone || !data.purpose) {
      return 'Guest name, guest phone and purpose are required.';
    }
    if (!/^\d{10}$/.test(data.guest_phone)) {
      return 'Guest phone must be exactly 10 digits.';
    }
    if (!data.arrival_time || !data.departure_time) {
      return 'Check-in and check-out time are required.';
    }
    return '';
  }

  async function checkAvailability() {
    const data = readForm();
    const error = validateBeforeAvailability(data);
    if (error) {
      showMessage(availabilitySection, 'negative', error);
      submitBtn.disabled = true;
      return;
    }

    try {
      const params = new URLSearchParams({
        arrival_date: data.arrival_date,
        departure_date: data.departure_date,
        room_type: data.room_type,
        rooms_required: String(data.rooms_required),
      });
      const res = await fetch(`/hostelmanagement/guest-room/availability/?${params.toString()}`, {
        method: 'GET',
        credentials: 'same-origin',
      });
      const payload = await res.json();

      if (!res.ok) {
        showMessage(availabilitySection, 'negative', payload.error || 'Could not check availability.');
        lastAvailability = null;
        submitBtn.disabled = true;
        return;
      }

      lastAvailability = payload;
      if (payload.is_available) {
        showMessage(
          availabilitySection,
          'positive',
          `Available: ${payload.available_count} room(s). Estimated total charge: ${payload.estimated_total_charge}`
        );
        summarySection.className = 'ui info message';
        summarySection.innerHTML = `
          <strong>Booking Summary</strong><br>
          Hostel: ${payload.hall_name} (${payload.hall_id})<br>
          Dates: ${data.arrival_date} to ${data.departure_date}<br>
          Room Type: ${data.room_type}<br>
          Rooms Required: ${data.rooms_required}<br>
          Total Guests: ${data.total_guest}<br>
          Charge/Day: ${payload.policy.charge_per_day}<br>
          Estimated Total: ${payload.estimated_total_charge}
        `;
        submitBtn.disabled = false;
      } else {
        showMessage(availabilitySection, 'warning', 'No rooms available for selected dates. Try alternative dates.');
        summarySection.className = 'ui warning message';
        summarySection.textContent = 'No room can be allocated for the selected range at this time.';
        submitBtn.disabled = true;
      }
    } catch (err) {
      showMessage(availabilitySection, 'negative', 'Network error while checking availability.');
      submitBtn.disabled = true;
    }
  }

  async function submitBooking(event) {
    event.preventDefault();
    hideMessage(feedback);

    const data = readForm();
    const error = validateBeforeSubmit(data);
    if (error) {
      showMessage(feedback, 'negative', error);
      return;
    }

    try {
      const res = await fetch('/hostelmanagement/guest-room/bookings/request/', {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCookie('csrftoken'),
        },
        body: JSON.stringify(data),
      });
      const payload = await res.json();

      if (!res.ok) {
        showMessage(feedback, 'negative', payload.error || 'Booking submission failed.');
        return;
      }

      showMessage(feedback, 'positive', `Booking request submitted successfully. Request ID: ${payload.request_id}`);
      form.reset();
      hideMessage(availabilitySection);
      summarySection.className = 'ui hidden message';
      summarySection.textContent = '';
      submitBtn.disabled = true;
      lastAvailability = null;
    } catch (err) {
      showMessage(feedback, 'negative', 'Network error while submitting booking request.');
    }
  }

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('arrival_date').setAttribute('min', today);
  document.getElementById('departure_date').setAttribute('min', today);
  document.getElementById('arrival_date').addEventListener('change', function() {
    document.getElementById('departure_date').setAttribute('min', this.value);
  });

  checkBtn.addEventListener('click', checkAvailability);
  form.addEventListener('submit', submitBooking);
})();
</script>
{% endblock %}
